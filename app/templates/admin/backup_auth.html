{% extends "base.html" %}

{% block page_title %}Backup Security Verification{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center mt-4">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm rounded-xl overflow-hidden">
                <div class="card-header bg-white border-bottom py-4 text-center">
                    <div class="d-inline-flex align-items-center justify-content-center bg-danger-subtle text-danger rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock-fill fs-3"></i>
                    </div>
                    <h4 class="mb-0 fw-bold text-dark">Security Verification</h4>
                </div>
                <div class="card-body p-4 p-md-5 bg-light bg-opacity-50">
                    <p class="text-muted text-center mb-4">Please enter your 4-digit administrator PIN to access sensitive actions.</p>
                    
                    <form method="POST" action="{{ url_for('admin_backup.auth') }}">
                        <div class="mb-4">
                            <label for="pin" class="form-label fw-bold text-secondary small text-uppercase letter-wide text-center d-block">Security PIN</label>
                            <input type="password" class="form-control form-control-lg bg-white text-center fs-3 letter-spacing-lg" id="pin" name="pin" maxlength="4" placeholder="••••" required autofocus autocomplete="off" style="letter-spacing: 0.5em;">
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm hover-scale">
                                Verify Access <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('main.home') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i> Return to Home</a>
            </div>
        </div>
    </div>
</div>

<style>
    .hover-scale {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .hover-scale:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md) !important;
    }
</style>
{% endblock %}
