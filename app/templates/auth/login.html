{% extends "base.html" %}

{% block page_title %}Admin Login{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-white border-0 text-center pt-5 pb-3">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle mb-3" style="width: 72px; height: 72px;">
                        <i class="bi bi-shield-lock text-primary fs-1"></i>
                    </div>
                    <h3 class="fw-bold text-dark mb-1">Administrator Login</h3>
                    <p class="text-muted small">Please enter your credentials to continue</p>
                </div>
                <div class="card-body p-4 p-md-5 pt-md-2">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-4">
                            <label for="username" class="form-label fw-bold text-secondary small text-uppercase">Username</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" id="username" name="username" placeholder="admin" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold text-secondary small text-uppercase">Password</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0" id="password" name="password" placeholder="••••••••" required>
                        </div>
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">
                                Secure Login <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="{{ url_for('main.home') }}" class="text-decoration-none text-muted small hover-primary transition-all">
                    <i class="bi bi-arrow-left me-1"></i> Return to Homepage
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
